[opener]
edit = [{ run = 'nvim "$@"', desc = "Edit", for = "unix", block = true }]
pdf = [{ run = 'tdf "$@" -m 1 -f', desc = "PDF", for = "unix", block = true }]
open = [{ run = 'open "$@"', desc = "Open", for = "macos" }]
reveal = [{ run = 'open -R "$@"', desc = "Reveal", for = "macos" }]
extract = [{ run = 'ya pub extract --list "$@"', desc = "Extract here" }]

[open]
rules = [
  { mime = "text/*", use = [
    "edit",
    "reveal",
  ] },
  { mime = "application/pdf", use = [
    "pdf",
    "open",
    "reveal",
  ] },
  { mime = "image/*", use = [
    "open",
    "reveal",
  ] },
  { mime = "{audio,video}/*", use = [
    "open",
    "reveal",
  ] },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [
    "extract",
    "reveal",
  ] },
  { mime = "application/{json,ndjson}", use = [
    "edit",
    "reveal",
  ] },
  { mime = "*/javascript", use = [
    "edit",
    "reveal",
  ] },
  { mime = "inode/empty", use = [
    "edit",
    "reveal",
  ] },
  { url = "*", use = [
    "open",
    "reveal",
  ] },
]
